<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt By Prompt Arcade</title>
    
    <link rel="stylesheet" href="css/main.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <!-- Host Navigation Bar -->
    <div id="host-top-bar">
        <div class="host-nav-group">
            <button class="nav-btn active" id="nav-select">Game Select</button>
            <button class="nav-btn" id="nav-lobby">Customization Lobby</button>
        </div>
        <div id="room-code" class="room-code-display" style="font-size: 1.5rem;">----</div>
    </div>

    <div id="host-container">
        <div id="game-canvas-container"></div>
        
        <div id="lobby-overlay" class="lobby-hidden">
            <div id="qr-code"></div>
            <div class="player-count" id="player-count-display">0 Player(s) Connected</div>
        </div>
    </div>

    <!-- Core Engine Scripts -->
    <script src="js/core/network.js"></script>
    <script src="js/core/character.js"></script>
    <script src="js/core/players.js"></script>
    <script src="js/core/engine.js"></script>
    
    <!-- Game Modules -->
    <script src="js/games/base.js"></script>
    <script src="js/games/select.js"></script>
    <script src="js/games/lobby.js"></script>
    <script src="js/games/crossy.js"></script>
    
    <script src="js/host.js"></script>
</body>
</html>
