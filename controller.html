<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Controller</title>
    
    <link rel="stylesheet" href="css/main.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

    <div id="portrait-lock">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <path d="M12 18h.01"></path>
            <path d="M20 12h2a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"></path>
        </svg>
        <h2>Rotate Device</h2>
        <p>Landscape mode required.</p>
    </div>

    <div id="controller-container">
        
        <div class="panel" id="connect-panel">
            <h2 style="text-align: center;">Join Arcade</h2>
            <div class="input-group">
                <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" style="text-transform: uppercase; text-align: center; font-size: 1.5rem; letter-spacing: 4px;">
            </div>
            <button class="btn" id="connect-btn">Connect</button>
        </div>

        <div id="dynamic-ui" class="view-hidden" style="width: 100%; height: 100%;">
            
            <!-- Customization Lobby -->
            <div class="panel lobby-split view-hidden" id="view-lobby">
                <div class="lobby-preview" id="preview-canvas-container"></div>
                <div class="lobby-controls">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="player-name" maxlength="12" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Hue</label>
                        <input type="range" id="hue-slider" class="hue-slider" min="0" max="360" value="210">
                    </div>
                    <div class="input-group">
                        <label>Face & Variant</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="face-style" style="flex: 1;"><option value="classic">Classic</option><option value="derpy">Derpy</option><option value="anime">Anime</option></select>
                            <select id="face-variant" style="flex: 1;"><option value="boy">Boy</option><option value="girl">Girl</option></select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Accessories</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="hat-select" style="flex: 1;"><option value="none">No Hat</option><option value="cap">Cap</option><option value="topHat">Top Hat</option><option value="crown">Crown</option></select>
                            <select id="mask-select" style="flex: 1;"><option value="none">No Mask</option><option value="bandit">Bandit</option><option value="bandana">Bandana</option></select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Back</label>
                        <select id="back-select"><option value="none">None</option><option value="cape">Hero Cape</option><option value="backpack">Backpack</option><option value="wings">Fairy Wings</option></select>
                    </div>
                    <!-- The Lobby doesn't need a READY button anymore because the Host controls when to switch screens! -->
                </div>
            </div>

            <!-- Generic Gamepad View -->
            <div class="panel view-hidden" id="view-gamepad" style="background-color: var(--bg-color);">
                <div class="gamepad-container">
                    <div class="d-pad">
                        <button class="d-btn up" data-action="dpad" data-dir="up"><svg viewBox="0 0 24 24"><path d="M12 4l-8 8h6v8h4v-8h6z"/></svg></button>
                        <button class="d-btn left" data-action="dpad" data-dir="left"><svg viewBox="0 0 24 24"><path d="M4 12l8 8v-6h8v-4h-8v-6z"/></svg></button>
                        <button class="d-btn right" data-action="dpad" data-dir="right"><svg viewBox="0 0 24 24"><path d="M20 12l-8-8v6H4v4h8v6z"/></svg></button>
                        <button class="d-btn down" data-action="dpad" data-dir="down"><svg viewBox="0 0 24 24"><path d="M12 20l8-8h-6V4h-4v8H4z"/></svg></button>
                    </div>
                    <div class="action-btn-container">
                        <button class="action-btn" data-action="btn_a">A</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/core/network.js"></script>
    <script src="js/core/character.js"></script>
    <script src="js/core/players.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
