<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Controller</title>
    
    <link rel="stylesheet" href="css/main.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
</head>
<body>

    <div id="controller-container">
        
        <div class="panel" id="connect-panel">
            <h2 style="text-align: center;">Join Arcade</h2>
            <div class="input-group">
                <label for="room-input">Room Code</label>
                <input type="text" id="room-input" placeholder="ABCD" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" style="text-transform: uppercase;">
            </div>
            <button class="btn" id="connect-btn">Join</button>
        </div>

        <div id="dynamic-ui" class="view-hidden" style="width: 100%; display: flex; justify-content: center;">
            
            <div class="panel view-hidden" id="view-lobby">
                <h2 style="text-align: center;">Customize</h2>
                
                <div class="input-group">
                    <label for="player-name">Your Name</label>
                    <input type="text" id="player-name" maxlength="12" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Color Hue</label>
                    <input type="range" id="hue-slider" class="hue-slider" min="0" max="360" value="210">
                </div>

                <div class="input-group">
                    <label>Face Style</label>
                    <select id="face-style">
                        <option value="classic">Classic</option>
                        <option value="derpy">Derpy</option>
                        <option value="anime">Anime</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Variant</label>
                    <select id="face-variant">
                        <option value="boy">Boy</option>
                        <option value="girl">Girl</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Hat</label>
                    <select id="hat-select">
                        <option value="none">None</option>
                        <option value="cap">Baseball Cap</option>
                        <option value="topHat">Top Hat</option>
                        <option value="crown">Crown</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Mask</label>
                    <select id="mask-select">
                        <option value="none">None</option>
                        <option value="bandit">Bandit Mask</option>
                        <option value="bandana">Bandana</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Back</label>
                    <select id="back-select">
                        <option value="none">None</option>
                        <option value="cape">Hero Cape</option>
                        <option value="backpack">Backpack</option>
                        <option value="wings">Fairy Wings</option>
                    </select>
                </div>

                <button class="btn" id="ready-btn" style="margin-top: 16px;">READY UP</button>
            </div>
        </div>

    </div>

    <script src="js/core/network.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
